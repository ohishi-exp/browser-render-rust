name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/rust-ci.yml@main
    with:
      binary_name: browser-render
      shared_key: browser-render-rust
      # rust-scraper/ is a git submodule (ohishi-exp/rust-scraper) and a
      # workspace member, so cargo metadata fails without recursing it.
      # Input added in ippoan/ci-workflows#138.
      submodules: 'recursive'
      # Cargo.lock is in .gitignore for this repo, so --locked (the rust-ci
      # default) breaks cargo build. Drop it; the trade-off is non-
      # reproducible CI builds, but matches the existing repo policy.
      cargo_build_args: ''
      # Drop `--all-features` from clippy/test: the optional `grpc` feature
      # triggers build.rs → tonic_build → requires `protoc`, which is not
      # available on the default GitHub runner image. Default features only.
      cargo_test_args: '--no-fail-fast'
      cargo_clippy_args: '--all-targets -- -D warnings'

  # main への merge (push) で Docker image を build → GHCR push → Cloudflare
  # Tunnel SSH 経由で Kagoya VPS へ deploy する。GitHub Actions runner は VPS へ
  # 直接到達できない想定のため、`cloudflared access ssh` を ProxyCommand にした
  # SSH で到達し、CF Access service token で認証する (rust-ichibanboshi ci.yml
  # と同パターン)。手動 fallback は scripts/deploy-kagoya.sh (直接 SSH) に残す。
  #
  # 実 deploy (pull + restart + health check) ロジックは scripts/deploy-remote.sh
  # に切り出し、build/push (このジョブ) とは分離している。
  deploy:
    name: Deploy to Kagoya VPS (CF Tunnel SSH)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          IMAGE: ghcr.io/ohishi-exp/browser-render-rust
        run: |
          TAG="${GITHUB_SHA::7}"
          docker build \
            --build-arg CARGO_BUILD_JOBS=2 \
            -t "${IMAGE}:${TAG}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"
          echo "IMAGE_TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Install cloudflared
        run: |
          curl -fsSL \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /tmp/cloudflared
          sudo install -m 0755 /tmp/cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: Write deploy SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy over Cloudflare Tunnel SSH
        env:
          DEPLOY_SSH_HOST: ${{ vars.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PROXY_COMMAND: "cloudflared access ssh --hostname %h"
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          IMAGE: ghcr.io/ohishi-exp/browser-render-rust
          TAG: ${{ env.IMAGE_TAG }}
        run: |
          if [ -z "$DEPLOY_SSH_HOST" ]; then
            echo "::error::vars.DEPLOY_SSH_HOST is not set — configure repo/org variable" >&2
            exit 1
          fi
          export DEPLOY_SSH_KEY_FILE="$HOME/.ssh/deploy_key"
          bash scripts/deploy-remote.sh

  auto-merge:
    name: Auto Merge
    needs: [ci]
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      needs.ci.result == 'success'
    uses: ippoan/ci-workflows/.github/workflows/auto-merge.yml@main
    # deploy job は push (refs/heads/master) 限定 trigger なので PR run の
    # auto-merge とは排他で並走しない (= merge → branch 削除で deploy が cancel
    # される race は起きない)。auto-merge.yml の deploy gate 静的検査は DAG だけ
    # 見て trigger 排他を判別できず deploy を needs 未配線として loud fail する
    # ので、明示的に除外する (rust-ichibanboshi ci.yml と同パターン)。
    with:
      deploy_gate_ignore: 'deploy'
    permissions:
      contents: write
      pull-requests: write
    secrets:
      CI_APP_ID: ${{ secrets.CI_APP_ID }}
      CI_APP_PRIVATE_KEY: ${{ secrets.CI_APP_PRIVATE_KEY }}
